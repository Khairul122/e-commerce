<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Brand colors gradient -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A2E1D" /> <!-- Primary / dark red-brown -->
      <stop offset="100%" stop-color="#D98324" /> <!-- Secondary / warm orange-amber -->
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#D98324" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer glowing circle ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#brandGradient)" stroke-width="3" stroke-dasharray="6 3" opacity="0.6" />
  
  <!-- Solid background circle -->
  <circle cx="50" cy="50" r="38" fill="#FBF3EA" filter="url(#softShadow)" />
  
  <g transform="translate(25, 23) scale(0.5)">
    <!-- Steaming Waves -->
    <path d="M28,15 Q33,5 38,15 T48,15" fill="none" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <path d="M42,12 Q47,2 52,12 T62,12" fill="none" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    
    <!-- Chef Hat Base / Bowl Top -->
    <path d="M15,40 C15,30 35,30 35,40 C35,30 65,30 65,40 C65,30 85,30 85,40 C88,40 90,42 90,45 C90,55 80,75 50,75 C20,75 10,55 10,45 C10,42 12,40 15,40 Z" fill="url(#brandGradient)" />
    
    <!-- Accent detail line on the bowl -->
    <path d="M25,52 Q50,62 75,52" fill="none" stroke="#FBF3EA" stroke-width="4" stroke-linecap="round" />
    
    <!-- Accent sprout / leaves -->
    <path d="M78,28 C74,28 70,32 70,36 C74,36 78,32 78,28 Z" fill="#D98324" />
    <path d="M82,24 C82,28 78,32 74,32 C74,28 78,24 82,24 Z" fill="#7A2E1D" />
  </g>
</svg>
